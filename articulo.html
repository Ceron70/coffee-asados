<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aroma & Carbón - Artículo</title>
    <link rel="icon" type="image/jpeg" href="imagenes/logo_2.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FDF8F0 0%, #F5EDE0 100%);
            color: #2C2418;
            line-height: 1.6;
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .top-bar {
            background: #1A0D07;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(26, 13, 7, 0.95);
        }
        .logo-area { display: flex; align-items: center; gap: 1rem; }
        .logo-area img { height: 55px; width: auto; border-radius: 12px; }
        .logo-area span { font-size: 1.4rem; font-weight: 700; color: #F5D5B0; font-family: 'Playfair Display', serif; }
        .btn-volver { background: rgba(210, 105, 30, 0.2); color: #F5D5B0; padding: 0.5rem 1.2rem; border-radius: 30px; text-decoration: none; font-size: 0.9rem; border: 1px solid rgba(210, 105, 30, 0.5); }
        .btn-volver i { margin-right: 0.5rem; }
        .btn-volver:hover { background: #8B4513; }
        .hero {
            background: linear-gradient(115deg, rgba(26, 13, 7, 0.85), rgba(44, 26, 16, 0.9)), 
                        url('https://images.pexels.com/photos/699953/pexels-photo-699953.jpeg?auto=compress&cs=tinysrgb&w=1600');
            background-size: cover;
            background-position: center 35%;
            padding: 3rem 2rem;
            text-align: center;
            color: white;
        }
        .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .articulo-imagen { width: 100%; max-height: 400px; object-fit: cover; border-radius: 24px; margin-bottom: 1.5rem; }
        .articulo-categoria { display: inline-block; background: linear-gradient(115deg, #D2691E, #A0522D); color: white; font-size: 0.8rem; padding: 0.3rem 1rem; border-radius: 50px; margin-bottom: 1rem; }
        .articulo-fecha { color: #A6521E; margin: 0.5rem 0 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .articulo-contenido { font-size: 1.05rem; color: #3E2416; line-height: 1.7; }
        .articulo-contenido p { margin-bottom: 1rem; }
        .articulo-contenido ul, .articulo-contenido ol { margin: 1rem 0 1rem 2rem; }
        .loading { text-align: center; padding: 3rem; color: #8B4513; }
        .footer {
            background: linear-gradient(145deg, #1A0D07, #2C1A10);
            color: #E7CFB5;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
            border-top: 4px solid #B87C4F;
        }
        @media (max-width: 768px) {
            .top-bar { flex-direction: column; text-align: center; }
            .hero h1 { font-size: 1.5rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo-area">
        <img src="imagenes/logo_2.jpg" alt="Logo Aroma & Carbón">
        <span>Aroma & Carbón</span>
    </div>
    <a href="blog.html" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver al blog</a>
</div>

<div class="hero">
    <div>
        <h1 id="articulo-titulo">Cargando artículo...</h1>
    </div>
</div>

<div class="container" id="articulo-container">
    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Cargando contenido...</div>
</div>

<div class="footer">
    <p>© 2025 Aroma & Carbón - Aroma a café, sabor a carbón ☕🔥</p>
</div>

<script>
    // Datos de los artículos (mismos que en blog.html)
    const articulos = {
        1: {
            id: 1,
            titulo: "Cómo elegir el mejor café para tu evento",
            categoria: "Coffee",
            contenido: "<p>El café es una de las bebidas más importantes en cualquier evento. Elegir el tipo adecuado puede marcar la diferencia.</p><p><strong>Consejos para elegir el mejor café:</strong></p><ul><li>Opta por granos recién tostados</li><li>Considera la intensidad que prefieras</li><li>Ofrece opciones descafeinadas</li><li>Prueba variedades de origen único</li></ul><p>En Aroma & Carbón usamos café de especialidad para garantizar la mejor experiencia en cada coffee break.</p>",
            imagen: "https://images.pexels.com/photos/312418/pexels-photo-312418.jpeg?w=600",
            fecha: "15/04/2025"
        },
        2: {
            id: 2,
            titulo: "Los secretos de un asado perfecto",
            categoria: "Asados",
            contenido: "<p>El asado es todo un arte. Con estos consejos lograrás un resultado espectacular.</p><p><strong>Secretos del asado perfecto:</strong></p><ul><li>La temperatura del carbón es clave</li><li>Los mejores cortes: vacío, chorizo, morcilla</li><li>El punto de la carne: jugosa por dentro, crocante por fuera</li><li>Deja reposar la carne antes de cortarla</li></ul><p>Déjanos el asado a nosotros y solo preocúpate de disfrutar.</p>",
            imagen: "https://images.pexels.com/photos/2253643/pexels-photo-2253643.jpeg?w=600",
            fecha: "10/04/2025"
        },
        3: {
            id: 3,
            titulo: "5 ideas para un coffee break exitoso",
            categoria: "Coffee",
            contenido: "<p>Un coffee break bien planificado puede marcar la diferencia en tus reuniones de trabajo.</p><p><strong>Ideas para tu coffee break:</strong></p><ul><li>Variedad de cafés (expreso, capuchino, latte)</li><li>Acompañamientos salados y dulces</li><li>Opción sin lactosa y vegana</li><li>Presentación cuidada y profesional</li></ul><p>Nosotros nos encargamos de todo para que tú solo te preocupes de tus invitados.</p>",
            imagen: "https://images.pexels.com/photos/3714958/pexels-photo-3714958.jpeg?w=600",
            fecha: "05/04/2025"
        },
        4: {
            id: 4,
            titulo: "Cortes de carne para asar",
            categoria: "Asados",
            contenido: "<p>Elegir el corte adecuado es fundamental para un buen asado.</p><p><strong>Los mejores cortes para la parrilla:</strong></p><ul><li><strong>Vacío:</strong> Jugoso y lleno de sabor</li><li><strong>Choripán:</strong> Clásico infaltable</li><li><strong>Morcilla:</strong> Tradicional y sabrosa</li><li><strong>Pechito de cerdo:</strong> Tierno y crocante</li></ul><p>En Aroma & Carbón seleccionamos los mejores cortes para tu evento.</p>",
            imagen: "https://images.pexels.com/photos/1753665/pexels-photo-1753665.jpeg?w=600",
            fecha: "28/03/2025"
        },
        5: {
            id: 5,
            titulo: "Cómo calcular la cantidad de comida por persona",
            categoria: "Tips",
            contenido: "<p>Calcular la cantidad correcta de comida evita desperdicios y garantiza que nadie se quede con hambre.</p><p><strong>Porciones sugeridas por persona:</strong></p><ul><li>Carne: 400-500 gramos</li><li>Pan: 2-3 unidades</li><li>Ensalada: 150-200 gramos</li><li>Bebida: 1-2 latas/litro</li><li>Postre: 1 porción</li></ul><p>Contáctanos para ayudarte a planificar la cantidad perfecta.</p>",
            imagen: "https://images.pexels.com/photos/3987121/pexels-photo-3987121.jpeg?w=600",
            fecha: "20/03/2025"
        }
    };

    function cargarArticulo() {
        const articuloId = localStorage.getItem('articuloId');
        console.log('ID del artículo:', articuloId);
        
        if (!articuloId) {
            window.location.href = 'blog.html';
            return;
        }
        
        const articulo = articulos[articuloId];
        
        if (articulo) {
            mostrarArticulo(articulo);
        } else {
            document.getElementById('articulo-container').innerHTML = '<div class="loading">Artículo no encontrado</div>';
        }
    }

    function mostrarArticulo(articulo) {
        document.getElementById('articulo-titulo').innerText = articulo.titulo;
        
        const container = document.getElementById('articulo-container');
        container.innerHTML = `
            <img class="articulo-imagen" src="${articulo.imagen}" alt="${articulo.titulo}" onerror="this.src='https://placehold.co/800x400?text=Imagen'">
            <span class="articulo-categoria">${articulo.categoria}</span>
            <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">${articulo.titulo}</h1>
            <div class="articulo-fecha"><i class="far fa-calendar-alt"></i> ${articulo.fecha}</div>
            <div class="articulo-contenido">${articulo.contenido}</div>
        `;
    }

    document.addEventListener('DOMContentLoaded', cargarArticulo);
</script>

</body>
</html>
